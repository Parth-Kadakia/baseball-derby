<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Batter test</title>
<style>
  html,body { margin:0; height:100%; background:#000; overflow:hidden;
    font-family: monospace; color:#fff; }
  #game { position:fixed; inset:0; }
  #info { position:fixed; top:10px; left:10px; font-size:13px;
    background:rgba(0,0,0,.6); padding:6px 10px; border-radius:6px;
    line-height:1.5; pointer-events:none; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="info">
  Single: 1=idle 2=preswing 3=swing 4=hit 5=miss 6=run 7=strikeout 8=ready<br>
  Sequence: Q=idle→pre→swing→idle &nbsp; W=...→hit &nbsp; E=...→miss &nbsp; T=...→strikeout<br>
  current: <span id="cur">idle</span>
</div>

<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.161.0/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';

const canvas = document.getElementById('game');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.setClearColor(0x102030, 1);
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();

// Side-on camera looking straight at the batter so feet placement is unambiguous
const camera = new THREE.PerspectiveCamera(40, innerWidth/innerHeight, 0.1, 100);
camera.position.set(0, 1.0, 6);
camera.lookAt(0, 1.0, 0);
addEventListener('resize', ()=>{
  renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix();
});

scene.add(new THREE.AmbientLight(0xffffff, 1));

// Ground: bright green plane at y=0. Anything below y=0 is "in the ground".
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(40, 40),
  new THREE.MeshBasicMaterial({ color: 0x2d7a33 })
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// Reference grid lines at the y=0 plane so the horizon is obvious
const grid = new THREE.GridHelper(40, 40, 0xffffff, 0x55aa55);
grid.position.y = 0.001;
scene.add(grid);

// A 1m red marker pole right next to the batter to compare scale and feet line
const pole = new THREE.Mesh(
  new THREE.BoxGeometry(0.05, 1.0, 0.05),
  new THREE.MeshBasicMaterial({ color: 0xff3030 })
);
pole.position.set(-0.8, 0.5, 0);
scene.add(pole);

// ============== sprite slicing (copied verbatim from index.html) ==============
function loadImage(src){
  return new Promise((res, rej)=>{
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = ()=> res(img);
    img.onerror = rej;
    img.src = src;
  });
}

function makeBgTest(sctx, W, H){
  const samples = [];
  for (const [x,y] of [[2,2],[W-3,2],[2,H-3],[W-3,H-3]]) {
    const p = sctx.getImageData(x,y,1,1).data;
    samples.push([p[0],p[1],p[2]]);
  }
  const sorted = (k) => samples.map(s=>s[k]).sort((a,b)=>a-b);
  const br = sorted(0)[2], bg = sorted(1)[2], bb = sorted(2)[2];
  const TOL = 8;
  return (r,g,b,a) => {
    if (a !== undefined && a < 5) return true;
    return Math.abs(r-br) <= TOL && Math.abs(g-bg) <= TOL && Math.abs(b-bb) <= TOL;
  };
}

/**
 * Cut a single sprite from a sheet rect. Returns a canvas where the bottom
 * edge is the lowest visible pixel of the character (its FEET).
 *
 * Strategy: trim transparent rows/cols from the rect. The JSON frames coming
 * out of the editor are already tightly cropped to the character bbox, so the
 * "feet at canvas-bottom" assumption holds as long as we trim any background
 * padding we add via color-keying.
 */
function cutSprite(sctx, rx, ry, rw, rh, isBg){
  const data = sctx.getImageData(rx, ry, rw, rh);
  const d = data.data;
  const W = data.width, H = data.height;

  // Color-key bg → alpha 0
  for (let i=0; i<d.length; i+=4){
    if (d[i+3] < 5 || isBg(d[i], d[i+1], d[i+2], d[i+3])){
      d[i+3] = 0;
    }
  }

  // Find tight bbox of remaining non-transparent pixels
  let miX = W, miY = H, maX = -1, maY = -1;
  for (let y=0; y<H; y++){
    for (let x=0; x<W; x++){
      if (d[(y*W+x)*4+3] > 0){
        if (x<miX) miX=x; if (y<miY) miY=y;
        if (x>maX) maX=x; if (y>maY) maY=y;
      }
    }
  }
  if (maX < 0){ const c=document.createElement('canvas'); c.width=1; c.height=1; return c; }

  const tw = maX-miX+1, th = maY-miY+1;
  const tmp = document.createElement('canvas');
  tmp.width = W; tmp.height = H;
  tmp.getContext('2d').putImageData(data, 0, 0);
  const out = document.createElement('canvas');
  out.width = tw; out.height = th;
  out.getContext('2d').drawImage(tmp, miX, miY, tw, th, 0, 0, tw, th);
  return out;
}

async function sliceFromJson(spec){
  const img = await loadImage(spec.sheet);
  const src = document.createElement('canvas');
  src.width = img.width; src.height = img.height;
  const sctx = src.getContext('2d', { willReadFrequently:true });
  sctx.drawImage(img, 0, 0);
  const isBg = makeBgTest(sctx, img.width, img.height);

  const out = {};
  for (const [name, rects] of Object.entries(spec.animations)){
    out[name] = rects.map(r => {
      const c = cutSprite(sctx, r.x|0, r.y|0, r.w|0, r.h|0, isBg);
      const tex = new THREE.CanvasTexture(c);
      tex.magFilter = THREE.NearestFilter;
      tex.minFilter = THREE.NearestFilter;
      tex.colorSpace = THREE.SRGBColorSpace;
      tex.generateMipmaps = false;
      return { texture: tex, w: c.width, h: c.height };
    });
  }
  return out;
}

// ============== batter ==============
class Batter {
  constructor(animations){
    this.animations = animations;
    this.mat = new THREE.MeshBasicMaterial({
      map:null, transparent:true, alphaTest:0.5, side:THREE.DoubleSide,
    });
    this.mesh = new THREE.Mesh(new THREE.PlaneGeometry(1,1), this.mat);
    scene.add(this.mesh);
    this.pixelScale = 0.011;
    this.frame = 0; this.timer = 0; this.fps = 8; this.loop = true;
    this.currentName = null;
  }
  play(name, fps=8, loop=true, onDone=null){
    if (!this.animations[name]) return;
    this.currentName = name; this.fps = fps; this.loop = loop;
    this.frame = 0; this.timer = 0; this.onDone = onDone;
    document.getElementById('cur').textContent = name;
    this._apply();
  }
  // Play a chain of [name, fps, loop?] entries. Each non-looping step advances
  // to the next when its last frame finishes; the final step uses its own loop
  // flag (so you can end on a looping idle).
  playSequence(steps){
    let i = 0;
    const next = () => {
      if (i >= steps.length) return;
      const [name, fps, loop] = steps[i++];
      this.play(name, fps, loop, loop ? null : next);
    };
    next();
  }
  _apply(){
    const f = this.animations[this.currentName][this.frame];
    this.mat.map = f.texture; this.mat.needsUpdate = true;
    const w = f.w * this.pixelScale;
    const h = f.h * this.pixelScale;
    this.mesh.scale.set(w, h, 1);
    // feet at world (0, 0, 0); plane is centered, so lift by h/2
    this.mesh.position.set(0, h/2, 0);
  }
  update(dt){
    if (!this.currentName) return;
    this.timer += dt;
    const spf = 1/this.fps;
    const frames = this.animations[this.currentName];
    let finished = false;
    while (this.timer >= spf){
      this.timer -= spf; this.frame++;
      if (this.frame >= frames.length){
        if (this.loop) this.frame = 0;
        else { this.frame = frames.length-1; finished = true; break; }
      }
    }
    this._apply();
    if (finished && this.onDone){ const cb = this.onDone; this.onDone = null; cb(); }
  }
}

let batter;
(async ()=>{
  const spec = await (await fetch('./slices/batsman.json')).json();
  const anims = await sliceFromJson(spec.batsman);
  console.log('loaded animations:', Object.keys(anims));
  batter = new Batter(anims);
  batter.play('idle', 6, true);
})();

const ANIMS = {
  Digit1: ['idle',      6,  true ],
  Digit2: ['preswing',  10, false],
  Digit3: ['swing',     18, false],
  Digit4: ['hit',       10, false],
  Digit5: ['miss',      10, false],
  Digit6: ['run',       12, true ],
  Digit7: ['strikeout', 8,  false],
  Digit8: ['ready',     6,  true ],
};
const SEQS = {
  KeyQ: [['preswing',10,false], ['swing',18,false], ['idle',6,true]],
  KeyW: [['preswing',10,false], ['swing',18,false], ['hit',10,false], ['run',12,true]],
  KeyE: [['preswing',10,false], ['swing',18,false], ['miss',10,false], ['idle',6,true]],
  KeyT: [['preswing',10,false], ['swing',18,false], ['strikeout',8,false], ['idle',6,true]],
};
addEventListener('keydown', (e)=>{
  if (!batter || e.repeat) return;
  if (ANIMS[e.code]){ const [n,f,l] = ANIMS[e.code]; batter.play(n,f,l); return; }
  if (SEQS[e.code]) batter.playSequence(SEQS[e.code]);
});

let last = performance.now();
function loop(now){
  const dt = Math.min(0.05, (now-last)/1000); last = now;
  if (batter) batter.update(dt);
  renderer.render(scene, camera);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
